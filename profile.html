  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <img src="images/logo.png" class="logo">


  <div class="menu">
    <a href="index.html">Home</a>

   <div class="dropdown">
  <button class="dropbtn">Produk</button>
    
    <div class="dropdown-content">
      <a href="detailproduk1.html">Pocket Soap</a>
      <a href="detailprodukrefill.html">Refill Soap</a>
    </div>
  </div>

    <a href="artikel_depan.html">Artikel</a>
  </div>


  
  <div class="right_profile">
     <a href="profile.html">
    <img src="images/user.jpg" id="navbarProfile" class="navbar-profile">
  </a>
    <a href="keranjang.html" class="cart-link_profile">
      <i class="fa-solid fa-cart-shopping"></i>
    </a>
  </div>
</div>

<a href="index.html" class="back-btn_profile">
    <i class="fa-solid fa-arrow-left"></i>
  </a>


<!-- Profile Section -->
<div class="profile-container">

  <div class="profile-card">

    <div class="profile-image-section">
      <img src="images/user.jpg" id="profilePreview" class="profile-image">

      <label for="uploadPhoto" class="upload-btn">
        Upload Foto
      </label>

      <input type="file" id="uploadPhoto" accept="image/*">
    </div>


    <div class="profile-form">

      <h2>Profil Saya</h2>

      <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap">

    <label>No Handphone</label>
        <input type="text" id="nohp" placeholder="Masukkan nomor HP">

    <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan email">

      <button class="save-btn" onclick="simpanProfil()">
    Simpan Perubahan
    </button>

    </div>

  </div>

</div>


<script>

  // ambil data saat halaman dibuka
  window.onload = function() {

    const nama = localStorage.getItem("nama");
    const nohp = localStorage.getItem("nohp");
    const email = localStorage.getItem("email");
    const foto = localStorage.getItem("foto");

    if(nama) {
      document.getElementById("nama").value = nama;
    }

    if(nohp) {
      document.getElementById("nohp").value = nohp;
    }

    if(email) {
      document.getElementById("email").value = email;
    }

    if(foto) {
  document.getElementById("profilePreview").src = foto;
  document.getElementById("navbarProfile").src = foto;
}
  }


  // simpan profil
  function simpanProfil() {

    const nama = document.getElementById("nama").value;
    const nohp = document.getElementById("nohp").value;
    const email = document.getElementById("email").value;

    localStorage.setItem("nama", nama);
    localStorage.setItem("nohp", nohp);
    localStorage.setItem("email", email);

    alert("Profil berhasil disimpan!");
  }


  // upload foto
  const uploadPhoto = document.getElementById("uploadPhoto");
  const profilePreview = document.getElementById("profilePreview");

  uploadPhoto.addEventListener("change", function() {

    const file = this.files[0];

    if(file) {

      const reader = new FileReader();

     reader.onload = function(e) {

  // ubah foto profile utama
  profilePreview.src = e.target.result;

  // ubah foto navbar
  document.getElementById("navbarProfile").src = e.target.result;

  // simpan foto
  localStorage.setItem("foto", e.target.result);
}

      reader.readAsDataURL(file);
    }

  });

</script>


<!-- SCRIPT LOGIN PROFILE -->
<script>

const userArea = document.getElementById("user-area");

const isLogin = localStorage.getItem("isLogin");
const foto = localStorage.getItem("foto");

if (isLogin === "true") {

  userArea.innerHTML = `
    
    <div class="profile-dropdown">

      <img 
        src="${foto || 'images/user.jpeg'}" 
        class="navbar-profile">

      <div class="profile-menu">
      
        <a href="profile.html">
          Profil
        </a>

        <a href="status.html">
          Pesanan Saya
        </a>

        <a href="#" onclick="logoutUser()">
          Logout
        </a>

      </div>

    </div>
  `;
}

function logoutUser() {

  localStorage.removeItem("isLogin");

  alert("Berhasil logout");

  window.location.href = "index.html";
}

</script>

</body>
</html>
