<script>

function tambahKeranjang(nama, harga, gambar) {

  let keranjang =
    JSON.parse(localStorage.getItem("keranjang")) || [];

  // cek apakah produk sudah ada
  const existingProduct = keranjang.find(
    item => item.nama === nama
  );

  if(existingProduct) {

    existingProduct.qty += 1;

  } else {

    keranjang.push({
      nama: nama,
      harga: harga,
      gambar: gambar,
      qty: 1
    });

  }

  localStorage.setItem(
    "keranjang",
    JSON.stringify(keranjang)
  );

  alert("Produk berhasil ditambahkan!");
}

</script>


<script>

const cartItems =
  document.getElementById("cart-items");

const totalHarga =
  document.getElementById("totalHarga");

let keranjang =
  JSON.parse(localStorage.getItem("keranjang")) || [];

function tampilkanKeranjang() {

  cartItems.innerHTML = "";

  let total = 0;

  if(keranjang.length === 0) {

    cartItems.innerHTML = `
      <div class="empty-cart">
        <h2>Keranjang Anda Kosong</h2>
        <p>Yuk tambahkan produk dulu</p>
      </div>
    `;

    totalHarga.innerText = "0";

    return;
  }

  keranjang.forEach((item, index) => {

    total += item.harga * item.qty;

    cartItems.innerHTML += `

      <div class="cart-card">

        <img src="${item.gambar}">

        <div class="cart-info">

          <div class="cart-top">

  <h3>${item.nama}</h3>

  <i 
    class="fa-solid fa-trash"
    onclick="hapusProduk(${index})">
  </i>

</div>

          <p>
            Rp ${item.harga.toLocaleString('id-ID')}
          </p>

          <div class="qty-box">

            <button onclick="kurangQty(${index})">
              -
            </button>

            <span>${item.qty}</span>

            <button onclick="tambahQty(${index})">
              +
            </button>

          </div>


        </div>

      </div>

    `;
  });

  totalHarga.innerText =
    total.toLocaleString('id-ID');
}

function tambahQty(index) {

  keranjang[index].qty++;

  simpanKeranjang();
}

function kurangQty(index) {

  if(keranjang[index].qty > 1) {
    keranjang[index].qty--;
  }

  simpanKeranjang();
}

function hapusProduk(index) {

  keranjang.splice(index, 1);

  simpanKeranjang();
}

function simpanKeranjang() {

  localStorage.setItem(
    "keranjang",
    JSON.stringify(keranjang)
  );

  tampilkanKeranjang();
}

tampilkanKeranjang();

</script>

</div>

}

}
