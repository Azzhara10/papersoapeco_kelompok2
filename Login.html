 <div class="right">

    <!-- MAIN -->
    <main class="main-content">
        <div class="auth-container">
            <h1 class="auth-title">Masuk ke Akun</h1>
            <p class="auth-subtitle">Silahkan masuk untuk melanjutkan</p>

    <!-- TAB -->
    <div class="auth-tabs">      
        <a href="Login.html" class="tab-btn active">
            Login
            </a>
        <a href="Daftar.html" class="tab-btn">
            Daftar

    <!-- FORM -->          
    <form class="auth-form">
        <h2 class="form-title">Login</h2>


    <!-- Email -->
        <label>Email</label>
        <input
            type="email"
            name="email"
            placeholder="Masukkan email Anda"
            required
        >

    <!-- Password -->
        <label>Password</label>
        <div class="password-wrapper">
            <input
            type="password"
            name="password"
            placeholder="Masukkan password Anda"
            required
            minlength="6">
           
            <i class="fa fa-eye"></i>
        </div>




   <!-- Button -->
<button type="button" class="login-btn" onclick="loginUser()">
    Login
</button>




    <!-- Links -->
<div class="links">
   <p class="lupa">Lupa Password?</p>


   <!-- Divider -->
   <div class="divider">
       <span>atau</span>
   </div>


   <!-- Google Login -->
   <button class="google-btn">
       <img src="images/google.png" class="google-icon">
       Masuk dengan Google
   </button>


   <p class="auth-note">Belum Punya Akun? <a href="Daftar.html" class="auth-link">Daftar</a></p>
   </p>

</div>
    </div>

            </form>

        </div>

    </main>



    <script>

function loginUser() {

  let email = document.querySelector("input[name='email']").value;
  let password = document.querySelector("input[name='password']").value;

  if (!email || !password) {
    alert("Email dan password harus diisi!");
    return;
  }

  // ambil data user dari register
  let users = JSON.parse(localStorage.getItem("users")) || [];

  // cek user cocok atau tidak
  let user = users.find(u =>
    u.email === email && u.password === password
  );

  if (!user) {
    alert("Email atau password salah!");
    return;
  }

  // simpan status login
  localStorage.setItem("isLogin", "true");
  localStorage.setItem("namaUser", user.nama);

  alert("Login berhasil!");

  // pindah ke home
  window.location.href = "index.html";
}

</script>
</body>
