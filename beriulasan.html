<body>

  </div>

  <div class="right">

    <div id="user-area">
      <a href="Login.html" class="login-link">Login</a>

<!-- Back button -->

<div class="cart-header">

<!-- CARD PESANAN -->
<div id="ulasan-product-list"></div>

<!-- RATING -->
<div class="ulasan-container">

  <div class="stars-rating">

    <i class="fa-regular fa-star"></i>
    <i class="fa-regular fa-star"></i>
    <i class="fa-regular fa-star"></i>
    <i class="fa-regular fa-star"></i>
    <i class="fa-regular fa-star"></i>

  </div>

  <p class="rating-text">
    Rating Pembelian Anda
  </p>

  <!-- KOMENTAR -->

    class="ulasan-input"
    placeholder="Berikan ulasan Anda di sini..."></textarea>

  <!-- TAMBAH FOTO -->
  <label class="upload-btn_ulasan">

    <input type="file" id="fotoInput" accept="image/*" hidden>

    <i class="fa-solid fa-plus"></i>
    Tambah Foto

    <div id="preview-container"></div>

  </label>

</div>

<!-- BUTTON -->
<button class="kirim-ulasan-btn">
  Kirim Ulasan
</button>






<!-- Footer -->
<footer class="footer">
  <div class="footer-top">
    <div class="footer-col">
      <a href="tentangkami.html">Tentang Kami</a>
      <a href="kebijakanprivasi.html">Kebijakan Privasi</a>

  </div>

  <div class="footer-bottom">
    © 2026 Paper Soap Eco. All Rights Reserved.
  </div>
</footer>


<script>

const ulasanList =
  document.getElementById("ulasan-product-list");

let orders =
  JSON.parse(localStorage.getItem("orders")) || [];

/* ambil order terakhir */
if(orders.length > 0){

  let order = orders[orders.length - 1];

  let orderHTML = `

    <div class="order-card">

      <div class="order-top">

        <h3>Paper Soap Eco</h3>

        <span class="status selesai">
          Selesai
        </span>

      </div>

  `;

  order.items.forEach(item => {

    orderHTML += `

      <div class="product-item ulasan-product">

        <img src="${item.gambar}" alt="Produk">

        <div class="product-info">

          <h4>${item.nama}</h4>

          <span>x${item.qty}</span>

        </div>

      </div>

    `;
  });

  orderHTML += `</div>`;

  ulasanList.innerHTML = orderHTML;
}

</script>


<script>

/* =========================
   STAR RATING
========================= */

const stars =
  document.querySelectorAll(".stars-rating i");

let selectedRating = 0;

stars.forEach((star, index) => {

  star.addEventListener("click", function(){

    selectedRating = index + 1;

    stars.forEach((s, i) => {

      if(i < selectedRating){

        s.classList.remove("fa-regular");
        s.classList.add("fa-solid");
        s.style.color = "gold";

      } else {

        s.classList.remove("fa-solid");
        s.classList.add("fa-regular");
        s.style.color = "#ccc";

      }

    });

  });

});

/* =========================
   KIRIM ULASAN
========================= */

const kirimBtn =
  document.querySelector(".kirim-ulasan-btn");

kirimBtn.addEventListener("click", function(){

  const ulasan =
    document.querySelector(".ulasan-input").value;

  if(selectedRating === 0){

    alert("Pilih rating dulu!");
    return;
  }

  if(ulasan.trim() === ""){

  alert("Tulis ulasan dulu!");
  return;
}

/* =========================
   SIMPAN REVIEW
========================= */

let orders =
  JSON.parse(localStorage.getItem("orders")) || [];

if(orders.length > 0){

  orders[orders.length - 1].review = {
    rating: selectedRating,
    komentar: ulasan
  };

  orders[orders.length - 1].sudahReview = true;

  localStorage.setItem(
    "orders",
    JSON.stringify(orders)
  );

}

alert(
  "Terima kasih telah memberi ulasan!"
);

window.location.href = "status.html";

});

</script>



<!-- SCRIPT LOGIN PROFILE -->
<script>

const userArea = document.getElementById("user-area");

const isLogin = localStorage.getItem("isLogin");
const foto = localStorage.getItem("foto");

if (isLogin === "true") {

  userArea.innerHTML = `
    
    <div class="profile-dropdown">

      <img 
        src="${foto || 'images/user.jpeg'}" 
        class="navbar-profile">

      <div class="profile-menu">
      
        <a href="profile.html">
          Profil
        </a>

        <a href="status.html">
          Pesanan Saya
        </a>

        <a href="#" onclick="logoutUser()">
          Logout
        </a>

      </div>

    </div>
  `;
}

function logoutUser() {

  localStorage.removeItem("isLogin");

  alert("Berhasil logout");

  window.location.href = "index.html";
}

</script>



<script>
const fotoInput = document.getElementById("fotoInput");
const previewContainer = document.getElementById("preview-container");

fotoInput.addEventListener("change", function () {

  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function (e) {
    previewContainer.innerHTML = `
      <img src="${e.target.result}" 
           style="width:120px; margin-top:10px; border-radius:10px;">
    `;
  };

  reader.readAsDataURL(file);

});
</script>


</body>
